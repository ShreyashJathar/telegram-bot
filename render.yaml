services:
  - type: web
    name: telegram-movie-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bot-database
          property: connectionString
      - key: TMDB_API_KEY
        sync: false
      - key: SHORTENER_API_KEY
        sync: false

databases:
  - name: bot-database
    plan: free
